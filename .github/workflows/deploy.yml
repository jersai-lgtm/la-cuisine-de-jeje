name: Build & déploiement GitHub Pages

# Build (bundles minifiés via tools/build.mjs) puis déploiement du dossier dist/
# sur GitHub Pages, à chaque push sur main.
#
# ⚠️ Prérequis (une seule fois) : Settings → Pages → "Build and deployment" →
#    Source = "GitHub Actions". Sinon l'étape de déploiement échoue.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule exécution de déploiement à la fois.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
