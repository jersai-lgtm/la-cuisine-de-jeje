name = "la-cuisine-de-jeje"
main = "index.js"
compatibility_date = "2024-11-01"

# ID du projet Firebase (sert à valider l'audience/issuer des jetons).
[vars]
FIREBASE_PROJECT_ID = "cuisine-jeje"

# Quota par utilisateur (KV). Crée l'espace puis colle son id ci-dessous :
#   npx wrangler kv namespace create RATE_LIMIT
# Décommente et renseigne l'id retourné :
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# ⚠️ Le secret ANTHROPIC_API_KEY ne se met PAS ici (ce fichier est versionné).
#    Il se définit hors du repo :  npx wrangler secret put ANTHROPIC_API_KEY

# --- 🔔 Notifications push ---------------------------------------------------
# 1) Abonnements push (KV) :
[[kv_namespaces]]
binding = "PUSH_SUBS"
id = "c16e7ab18d5d47379ee468b851884ea2"

# 2) Secrets VAPID (hors repo) :
#      npx wrangler secret put VAPID_PUBLIC_KEY
#      npx wrangler secret put VAPID_PRIVATE_KEY
#      npx wrangler secret put VAPID_SUBJECT      (ex. mailto:jerome.sainthot@gmail.com)

# 3) Crons (UTC) — le worker ne diffuse qu'au bon créneau Paris (été/hiver) :
#    09h30 + 10h30 UTC → 11h30 Paris (recette du jour, tous les jours) ;
#    08h00 + 09h00 UTC samedi → 10h00 Paris (rappel liste de courses).
[triggers]
crons = ["30 9 * * *", "30 10 * * *", "0 8 * * 6", "0 9 * * 6"]
